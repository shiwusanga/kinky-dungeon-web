<body style="width:100%; height:100%; background-color:black; margin:0px; padding:0px; overflow:hidden;">

<div id="loading-screen" style="position:fixed;inset:0;z-index:9999;background:#0a0a0f;color:#e8e8e8;font-family:-apple-system,Segoe UI,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;transition:opacity .6s ease;">
	<img src="Game/Logo.png" alt="Kinky Dungeon" style="width:min(60vw,260px);height:auto;" onerror="this.style.display='none'" />
	<div style="font-size:20px;letter-spacing:2px;">Kinky Dungeon · 网页版</div>
	<div style="width:min(70vw,320px);height:8px;background:#222;border-radius:6px;overflow:hidden;">
		<div id="loading-fill" style="width:8%;height:100%;background:linear-gradient(90deg,#ff6b9d,#c44);transition:width .4s;"></div>
	</div>
	<div id="loading-text" style="font-size:13px;color:#9aa;">正在加载游戏资源…（首次约需十几秒）</div>
</div>
<script>
	(function(){
		var fill=document.getElementById('loading-fill');
		var txt=document.getElementById('loading-text');
		var pct=8;
		var timer=setInterval(function(){
			pct=Math.min(pct+Math.random()*6,85);
			fill.style.width=pct+'%';
		},700);
		function done(){
			clearInterval(timer);
			fill.style.width='100%';
			txt.textContent='加载完成，进入游戏…';
			var s=document.getElementById('loading-screen');
			s.style.opacity='0';
			setTimeout(function(){ s.style.display='none'; },650);
		}
		window.addEventListener('load',function(){ setTimeout(done,400); });
		setTimeout(function(){ var s=document.getElementById('loading-screen'); if(s && s.style.display!=='none') done(); },20000);
	})();
</script>
